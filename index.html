<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Ion Simulation</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <canvas id="world"></canvas>
  <div id="stats-panel">
    <h3>Simulation Stats</h3>

    <div class="stat-row"><span>Selected ion:</span><span id="stat-ion">Na</span></div>
    <div class="stat-row"><span>Gradient (inside/total):</span><span id="stat-gradient">0.00</span></div>
    <div class="stat-row"><span>Intra : Extra:</span><span id="stat-intra-extra">0% : 0%</span></div>

    <hr>

    <div class="stat-row"><span>Inside count:</span><span id="stat-intra-count">0</span></div>
    <div class="stat-row"><span>Outside count:</span><span id="stat-extra-count">0</span></div>
    <div class="stat-row"><span>Total count:</span><span id="stat-total-count">0</span></div>
  </div>



  </div>

  <div id="control-panel">
    <div class="input-group">
      <label>1. Select Ion:</label>
      <div id="ion-buttons-grid">
        <button id="na-button" class="ion-button active">Na</button>
        <button id="k-button" class="ion-button">K</button>
        <button id="cl-button" class="ion-button">Cl</button>
        <button id="ca-button" class="ion-button">Ca</button>
        <button id="mg-button" class="ion-button">Mg</button>
      </div>
    </div>

    <div class="input-group">
      <label>2. Number of Particles:</label>
      <input type="number" id="particle-count" value="5" min="1" max="100">
    </div>

    <div class="input-group">
      <label>3. Location:</label>
      <div class="radio-group">
        <label><input type="radio" name="location" value="center" checked> Center</label>
        <label><input type="radio" name="location" value="top"> Top</label>
        <label><input type="radio" name="location" value="bottom"> Bottom</label>
        <label><input type="radio" name="location" value="left"> Left</label>
        <label><input type="radio" name="location" value="right"> Right</label>
        <label><input type="radio" name="location" value="custom"> Custom</label>
      </div>
    </div>

    <div id="custom-coords" style="display: none;">
      <div class="coord-row">
        <label>X:</label>
        <input type="number" id="coord-x" value="400">
      </div>
      <div class="coord-row">
        <label>Y:</label>
        <input type="number" id="coord-y" value="400">
      </div>
      <div id="coord-error" class="error-msg"></div>
    </div>

    <button id="add-button" class="action-button">Add Particles</button>
    <div id="channel-control">
      <button id="channel-open-button">Open Channels</button>
      <button id="channel-close-button">Close Channels</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="/ui_script.js"></script>
  <script type="module" src="/init_script.js"></script>
  <script type="module" src="/particles_script.js"></script>
  <script type="module" src="/rendering_script.js"></script>
</body>

</html>
